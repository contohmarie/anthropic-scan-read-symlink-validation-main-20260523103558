name: Validate scan-plugins Read symlink boundary

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq
          npm install -g @anthropic-ai/claude-code@2.1.145
          claude --version

      - name: Clone affected repository
        run: |
          set -euo pipefail
          git clone https://github.com/anthropics/claude-plugins-community.git target
          cd target
          git checkout 2ec490ecef43f7c55320f2a01d12badffba46a05

      - name: Run PoC with local fake API
        id: poc
        env:
          ACTION_PATH: ${{ github.workspace }}/target/.github/actions/scan-plugins
          VALIDATE_LIB: ${{ github.workspace }}/target/.github/actions/validate-plugins/lib/common.sh
        run: |
          set -euo pipefail
          node poc/scan-plugins-read-tool-symlink-file-read-poc.js | tee poc-output.txt
          grep -q 'normal_repo_file_read_inside_clone=true' poc-output.txt
          grep -q 'normal_repo_file_did_not_include_dummy_secret=true' poc-output.txt
          grep -q 'symlink_target_outside_clone_read=true' poc-output.txt
          grep -q 'controlled_downstream_echo_to_logs_or_summary=true' poc-output.txt

      - name: Upload validation output
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: poc-output.txt
          retention-days: 7
